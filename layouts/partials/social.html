{{ with .Site.Params.Author.links }}
<section class="social-section not-prose mt-8 mb-4">
  <h2 class="strava-heading">
    {{ partial "icon.html" "link" }}
    Connect
  </h2>
  <div class="social-card">
    {{ range $links := . }}
      {{ range $name, $url := $links }}
        {{ $isEmail := eq $name "email" }}
        <a
          href="{{ cond $isEmail "#" ($url | safeURL) }}"
          {{ if $isEmail }}
            data-email="{{ $url | base64Encode }}"
            data-subject="Contact"
          {{ end }}
          target="_blank"
          rel="me noopener noreferrer"
          class="social-link"
          aria-label="{{ $name | title }}"
          title="{{ $name | title }}">
          <span class="social-icon">{{ partial "icon.html" $name }}</span>
          <span class="social-label">{{ $name | title }}</span>
        </a>
      {{ end }}
    {{ end }}
  </div>
</section>
{{ end }}
